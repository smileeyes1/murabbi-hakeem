<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المربّي الحكيم</title>

<style>
body {
  font-family: Tahoma, Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 10px;
}

h2 {
  text-align: center;
  color: #2c3e50;
}

p {
  text-align: center;
  color: #555;
}

#chat {
  background: #ffffff;
  border-radius: 8px;
  padding: 10px;
  height: 60vh;
  overflow-y: auto;
  margin-bottom: 10px;
}

.message {
  margin: 8px 0;
  padding: 10px;
  border-radius: 8px;
  line-height: 1.6;
}

.user { background: #d1ecf1; }
.bot  { background: #e8f5e9; }

#inputArea {
  display: flex;
  gap: 5px;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
}

button {
  padding: 12px;
  font-size: 16px;
  background: #4caf50;
  color: white;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}
</style>
</head>

<body>

<h2>👨‍🏫 المربّي الحكيم</h2>
<p>حوار تعليمي بذكاء صناعي وصوت بشري</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="msg" type="text" placeholder="اكتب سؤالك هنا...">
  <button onclick="sendMessage()">إرسال</button>
</div>

<script>
// 🔗 ضع رابط Apps Script هنا (ينتهي بـ /exec)
const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw_XXXX/exec";

// 🎙️ الصوت
function speak(text) {
  window.speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text);
  u.lang = "ar-SA";
  u.rate = 0.85;
  speechSynthesis.speak(u);
}

async function sendMessage() {
  const chat = document.getElementById("chat");
  const input = document.getElementById("msg");
  const text = input.value.trim();
  if (!text) return;

  chat.innerHTML += `<div class="message user">👤 أنت: ${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
  input.value = "";

  const waiting = document.createElement("div");
  waiting.className = "message bot";
  waiting.textContent = "🤖 المربّي: أفكّر...";
  chat.appendChild(waiting);

  try {
    const res = await fetch(`${SCRIPT_URL}?q=${encodeURIComponent(text)}`);
    const reply = await res.text();   // ✅ نقرأ النص مباشرة

    waiting.textContent = "🤖 المربّي: " + reply;
    speak(reply);

  } catch (e) {
    waiting.textContent = "❌ تعذّر الاتصال بالخادم.";
    console.error(e);
  }
}
</script>

</body>
</html>

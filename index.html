<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>المربّي الحكيم</title>

<style>
body {
  font-family: Tahoma, Arial, sans-serif;
  background: #f4f6f8;
  margin: 0;
  padding: 10px;
}

h2 {
  text-align: center;
  color: #2c3e50;
  margin-bottom: 5px;
}

p {
  text-align: center;
  color: #555;
  margin-top: 0;
}

#chat {
  background: #ffffff;
  border-radius: 8px;
  padding: 10px;
  height: 60vh;
  overflow-y: auto;
  margin-bottom: 10px;
}

.message {
  margin: 8px 0;
  padding: 10px;
  border-radius: 8px;
  line-height: 1.6;
  font-size: 15px;
}

.user {
  background: #d1ecf1;
}

.bot {
  background: #e8f5e9;
}

#inputArea {
  display: flex;
  gap: 5px;
}

input {
  flex: 1;
  padding: 12px;
  font-size: 16px;
}

button {
  padding: 12px 16px;
  font-size: 16px;
  background: #4caf50;
  color: #ffffff;
  border: none;
  border-radius: 6px;
  cursor: pointer;
}

button:hover {
  background: #43a047;
}
</style>
</head>

<body>

<h2>👨‍🏫 المربّي الحكيم</h2>
<p>حوار تعليمي بذكاء صناعي وصوت بشري</p>

<div id="chat"></div>

<div id="inputArea">
  <input id="msg" type="text" placeholder="اكتب سؤالك هنا...">
  <button onclick="sendMessage()">إرسال</button>
</div>

<script>
// =====================================================
// 🔗 ضع هنا رابط Apps Script (ينتهي بـ /exec)
// =====================================================
const SCRIPT_URL = "ضع_هنا_رابطك_الذي_ينتهي_بـ_exec";

// =====================================================
// 🎙️ الصوت البشري
// =====================================================
function speak(text) {
  window.speechSynthesis.cancel();
  const utterance = new SpeechSynthesisUtterance(text);
  utterance.lang = "ar-SA";
  utterance.rate = 0.85;   // نبرة هادئة تعليمية
  utterance.pitch = 1.0;
  speechSynthesis.speak(utterance);
}

// =====================================================
// 📩 إرسال السؤال إلى Gemini عبر Apps Script
// =====================================================
async function sendMessage() {
  const chat = document.getElementById("chat");
  const input = document.getElementById("msg");
  const text = input.value.trim();

  if (!text) return;

  // رسالة المستخدم
  chat.innerHTML += `<div class="message user">👤 أنت: ${text}</div>`;
  chat.scrollTop = chat.scrollHeight;
  input.value = "";

  // رسالة انتظار
  const waiting = document.createElement("div");
  waiting.className = "message bot";
  waiting.innerText = "🤖 المربّي: أفكّر بتأنٍ...";
  chat.appendChild(waiting);
  chat.scrollTop = chat.scrollHeight;

  try {
    const response = await fetch(
      `${SCRIPT_URL}?q=${encodeURIComponent(text)}`
    );

    // ✅ التعديل المهم للتعامل الصحيح مع رد Apps Script
    if (!response.ok) {
      throw new Error("HTTP Error");
    }

    const reply = await response.text();

    waiting.innerText = `🤖 المربّي: ${reply}`;
    speak(reply);

  } catch (err) {
    waiting.innerText = "❌ حدث خطأ، حاول مرة أخرى.";
    console.error(err);
  }

  chat.scrollTop = chat.scrollHeight;
}
</script>

</body>
</html>
